<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>United Transports — Complete</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8e8;
      padding: 40px 32px;
      text-align: center;
    }

    .check {
      width: 64px;
      height: 64px;
      background: #f0fdf4;
      border: 2px solid #bbf7d0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
      color: #16a34a;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>All Done!</h1>
    <p>
      Your identity verification has been submitted successfully.<br />
      Our team will review your application shortly.
    </p>
  </div>
</body>
</html>
