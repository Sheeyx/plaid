<script>
  const CREATE_LINK_TOKEN_API =
    "/api/idv/create_link_token";

  const COMPLETE_IDV_API =
    "/api/idv/complete";

  const COMPLETE_ROUTE =
    "/complete";

  let isOpening = false;

  function getToken() {
    const params =
      new URLSearchParams(
        window.location.search
      );

    const tokenFromUrl =
      params.get("token");

    if (
      tokenFromUrl &&
      tokenFromUrl.trim() !== ""
    ) {
      const newToken =
        tokenFromUrl.trim();

      const existingToken =
        sessionStorage.getItem(
          "plaid_token"
        );

      if (
        existingToken !== newToken
      ) {
        sessionStorage.clear();
      }

      sessionStorage.setItem(
        "plaid_token",
        newToken
      );

      return newToken;
    }

    return (
      sessionStorage.getItem(
        "plaid_token"
      ) || null
    );
  }

  function showError(message) {
    const errorBox =
      document.getElementById(
        "error-box"
      );

    errorBox.textContent =
      message;

    errorBox.style.display =
      "block";
  }

  function hideError() {
    const errorBox =
      document.getElementById(
        "error-box"
      );

    errorBox.textContent = "";
    errorBox.style.display =
      "none";
  }

  function setButtonLoading(
    isLoading
  ) {
    const button =
      document.getElementById(
        "verify-btn"
      );

    button.disabled = isLoading;

    button.textContent =
      isLoading
        ? "Opening Plaid..."
        : "Start Identity Verification →";
  }

  function extractErrorMessage(
    data
  ) {
    if (!data) {
      return "Request failed";
    }

    if (
      data.error &&
      data.error.error_message
    ) {
      return data.error.error_message;
    }

    if (
      data.error &&
      data.error.display_message
    ) {
      return data.error
        .display_message;
    }

    if (
      data.error &&
      typeof data.error ===
        "string"
    ) {
      return data.error;
    }

    if (data.message) {
      return data.message;
    }

    return "Request failed";
  }

  async function markCompleted(
    token
  ) {
    console.log(
      "Updating CRM stage to Completed..."
    );

    const response = await fetch(
      COMPLETE_IDV_API,
      {
        method: "POST",
        headers: {
          "Content-Type":
            "application/json",
        },
        body: JSON.stringify({
          token,
        }),
      }
    );

    let data = null;

    try {
      data = await response.json();
    } catch (error) {
      throw new Error(
        "CRM server returned an invalid response"
      );
    }

    console.log(
      "CRM completion response:",
      data
    );

    if (!response.ok) {
      throw new Error(
        extractErrorMessage(data)
      );
    }

    return data;
  }

  async function startIDV() {
    if (isOpening) {
      return;
    }

    const token = getToken();

    console.log(
      "\n=== START IDV ==="
    );
    console.log(
      "Timestamp:",
      new Date().toISOString()
    );
    console.log(
      "Token exists:",
      Boolean(token)
    );
    console.log(
      "=================\n"
    );

    if (!token) {
      showError(
        "Verification token is missing. Please open the original link from your email."
      );

      return;
    }

    if (
      typeof Plaid ===
      "undefined"
    ) {
      showError(
        "Plaid SDK failed to load. Please refresh the page."
      );

      return;
    }

    isOpening = true;
    hideError();
    setButtonLoading(true);

    try {
      const response = await fetch(
        CREATE_LINK_TOKEN_API,
        {
          method: "POST",
          headers: {
            "Content-Type":
              "application/json",
          },
          body: JSON.stringify({
            token,
          }),
        }
      );

      let data = null;

      try {
        data =
          await response.json();
      } catch (error) {
        throw new Error(
          "Server returned an invalid response"
        );
      }

      console.log(
        "\n=== LINK TOKEN RESPONSE ==="
      );
      console.log(
        "Status:",
        response.status
      );
      console.log(
        "Data:",
        data
      );
      console.log(
        "===========================\n"
      );

      if (!response.ok) {
        throw new Error(
          extractErrorMessage(data)
        );
      }

      if (!data.link_token) {
        throw new Error(
          "Plaid link_token was not returned"
        );
      }

      /*
       * Link token yaratilganda backend:
       * Plaid_Stage = Plaid Verification
       */
      const handler =
        Plaid.create({
          token:
            data.link_token,

          onLoad: function () {
            console.log(
              "\n=== PLAID LOADED ===\n"
            );
          },

          onSuccess:
            async function (
              publicToken,
              metadata
            ) {
              console.log(
                "\n=== PLAID ON_SUCCESS ==="
              );
              console.log(
                "Timestamp:",
                new Date().toISOString()
              );
              console.log(
                "link_session_id:",
                metadata?.link_session_id
              );
              console.log(
                "status:",
                metadata?.status
              );
              console.log(
                "Full metadata:",
                JSON.stringify(
                  metadata,
                  null,
                  2
                )
              );
              console.log(
                "========================\n"
              );

              try {
                /*
                 * Plaid muvaffaqiyatli tugaganda:
                 * Plaid_Stage = Completed
                 * Plaid_Token_Status = Used
                 * Plaid_Token_Used_Time = now
                 */
                await markCompleted(
                  token
                );

                sessionStorage.clear();

                window.location.href =
                  COMPLETE_ROUTE;
              } catch (error) {
                console.error(
                  "Failed to update CRM completion:",
                  error
                );

                showError(
                  error.message ||
                    "Verification completed, but CRM could not be updated."
                );

                isOpening = false;
                setButtonLoading(
                  false
                );
              }
            },

          onExit: function (
            error,
            metadata
          ) {
            console.log(
              "\n=== PLAID ON_EXIT ==="
            );
            console.log(
              "Timestamp:",
              new Date().toISOString()
            );
            console.log(
              "Error:",
              error
            );
            console.log(
              "Metadata:",
              JSON.stringify(
                metadata,
                null,
                2
              )
            );
            console.log(
              "=====================\n"
            );

            if (error) {
              showError(
                "Verification was cancelled or failed. Please try again."
              );
            }

            isOpening = false;
            setButtonLoading(false);
          },

          onEvent: function (
            eventName,
            metadata
          ) {
            console.log(
              "\n=== PLAID EVENT ==="
            );
            console.log(
              "Event:",
              eventName
            );
            console.log(
              "view_name:",
              metadata?.view_name
            );
            console.log(
              "exit_status:",
              metadata?.exit_status
            );
            console.log(
              "link_session_id:",
              metadata?.link_session_id
            );
            console.log(
              "===================\n"
            );
          },
        });

      handler.open();
    } catch (error) {
      console.error(
        "\n=== START IDV ERROR ==="
      );
      console.error(
        "Error:",
        error
      );
      console.error(
        "=======================\n"
      );

      showError(
        error.message ||
          "Could not start Plaid. Please try again."
      );

      isOpening = false;
      setButtonLoading(false);
    }
  }

  window.addEventListener(
    "load",
    function () {
      const token = getToken();

      console.log(
        "\n=== VERIFY PAGE LOADED ==="
      );
      console.log(
        "Token exists:",
        Boolean(token)
      );
      console.log(
        "==========================\n"
      );

      if (!token) {
        showError(
          "Verification token is missing. Please open the original link from your email."
        );
      }
    }
  );
</script>
